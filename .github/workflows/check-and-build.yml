name: Watch PHP Release and Build CLI

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Check and rebuild newest PHP release'
        type: boolean
        default: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Get latest PHP release
        id: check
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/php/php-src/tags?per_page=50 | jq -r '[.[] | select(.name | test("^php-[0-9]+\\.[0-9]+\\.[0-9]+$"))][0].name')
          MY_LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$LATEST_TAG" != "$MY_LATEST_RELEASE" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.new_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: "ubuntu_25.10"
            container: "ubuntu:25.10"
          - os_name: "ubuntu_25.04"
            container: "ubuntu:25.04"
          - os_name: "ubuntu_24.04"
            container: "ubuntu:24.04"
          - os_name: "ubuntu_22.04"
            container: "ubuntu:22.04"
          - os_name: "almalinux_10"
            container: "almalinux:10"
          - os_name: "almalinux_9"
            container: "almalinux:9"
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install dependencies
        run: |
          if command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y \
              build-essential wget tar autoconf pkg-config bison re2c \
              libxml2-dev libsqlite3-dev libcurl4-openssl-dev \
              libssl-dev libzip-dev zlib1g-dev libonig-dev \
              libicu-dev libsodium-dev libgmp-dev libpng-dev \
              libjpeg-dev libfreetype6-dev libwebp-dev libxpm-dev \
              libreadline-dev
          else
            dnf install -y epel-release || dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-$(rpm -E %rhel).noarch.rpm || true
            dnf config-manager --set-enabled crb || dnf config-manager --set-enabled powertools || true
            dnf groupinstall -y "Development Tools" && dnf install -y \
              wget tar autoconf pkg-config bison re2c \
              libxml2-devel sqlite-devel libcurl-devel \
              openssl-devel libzip-devel zlib-devel oniguruma-devel \
              libicu-devel libsodium-devel gmp-devel libpng-devel \
              libjpeg-devel freetype-devel libwebp-devel libXpm-devel \
              readline-devel
          fi

      - name: Download and Build PHP CLI
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          VERSION_NUM="${VERSION#php-}"
          wget https://github.com/php/php-src/archive/refs/tags/${VERSION}.tar.gz -O php.tar.gz
          tar -xzf php.tar.gz
          cd php-src-${VERSION}

          # Download igbinary and add to ext directory for static build
          wget https://github.com/igbinary/igbinary/archive/refs/heads/master.tar.gz -O igbinary.tar.gz
          tar -xzf igbinary.tar.gz
          mv igbinary-master ext/igbinary

          # Download phpredis and add to ext directory for static build
          wget https://github.com/phpredis/phpredis/archive/refs/heads/develop.tar.gz -O phpredis.tar.gz
          tar -xzf phpredis.tar.gz
          mv phpredis-develop ext/redis

          ./buildconf --force
          ./configure \
            --prefix=/opt/php \
            --enable-cli \
            --enable-mbstring \
            --enable-opcache \
            --enable-sockets \
            --enable-pcntl \
            --enable-intl \
            --enable-gd \
            --enable-bcmath \
            --enable-exif \
            --enable-soap \
            --enable-igbinary \
            --enable-redis \
            --enable-redis-igbinary \
            --enable-xml \
            --enable-dom \
            --enable-xmlreader \
            --enable-xmlwriter \
            --enable-simplexml \
            --enable-tokenizer \
            --with-iconv \
            --with-libxml \
            --with-zlib \
            --with-curl \
            --with-openssl \
            --with-zip \
            --with-mysqli \
            --with-pdo-mysql \
            --with-sodium \
            --with-gmp \
            --with-readline \
            --with-freetype \
            --with-jpeg \
            --with-webp \
            --with-xpm \
            --without-sqlite3 \
            --without-pdo-sqlite

          make -j$(nproc)

          mkdir -p ../dist
          BINARY_NAME="php-${{ matrix.os_name }}"
          strip --strip-all sapi/cli/php
          cp sapi/cli/php ../dist/${BINARY_NAME}

          cd ../dist
          sha256sum ${BINARY_NAME} > ${BINARY_NAME}.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ matrix.os_name }}
          path: dist/

  publish-release:
    needs: [check-version, build-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-bins
          merge-multiple: true

      - name: Delete existing Release (Manual Trigger Only)
        if: github.event_name == 'workflow_dispatch'
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: PHP ${{ needs.check-version.outputs.version }}
          body: |
            ## Automated PHP CLI Build for Panel
            - **Version:** ${{ needs.check-version.outputs.version }}
            - **Type:** ${{ github.event_name == 'workflow_dispatch' && 'Manual Rebuild' || 'Automatic Update' }}
            - **Source:** [PHP Upstream](https://github.com/php/php-src/releases/tag/${{ needs.check-version.outputs.version }})
            - **Extensions:** mbstring, sockets, pcntl, intl, gd (freetype/jpeg/webp/xpm), bcmath, exif, soap, xml, dom, xmlreader, xmlwriter, simplexml, tokenizer, iconv, libxml, zlib, curl, openssl, zip, mysqli, pdo-mysql, sodium, gmp, readline, igbinary, redis (igbinary)
          files: all-bins/*
          token: ${{ secrets.GITHUB_TOKEN }}